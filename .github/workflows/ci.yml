name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify Node supports native TS stripping (>= 22.6)
        run: |
          node --version
          node -e 'const [maj,min] = process.versions.node.split(".").map(Number); if (maj < 22 || (maj === 22 && min < 6)) { console.error("Node >= 22.6 required"); process.exit(1); }'

      - name: Run test suite
        run: node --test tests/*.test.mjs
